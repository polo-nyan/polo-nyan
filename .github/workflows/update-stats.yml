# Auto-update GitHub Profile README from live GitHub API data.
#
# The job fetches comprehensive repo/language/commit stats for `polo-nyan`
# (and the `smol-kitten` org) into stats.json — including AI pair-programming
# usage parsed from `Co-authored-by:` trailers (which Anthropic model families
# and models assisted, and how that trends over time) — then assembles
# README.md from a template via scripts/build-readme.sh. Only the region between the
# <!-- STATS:START --> / <!-- STATS:END --> markers is regenerated, so any
# hand-written content in README.md is preserved. The job only commits when
# there is an actual diff.
#
# === TOKEN SETUP FOR SELF-HOSTED RUNNERS ===
# Self-hosted runners (especially Docker containers) may not have access to
# repository secrets, so the token is resolved in this order:
#
#   1. Token file:  /run/secrets/gh_stats_token, ~/.gh_stats_token, /etc/gh_stats_token
#   2. Env var:     GH_STATS_TOKEN
#   3. Secret:      PAT_TOKEN  (repository/org secret)
#   4. Fallback:    GITHUB_TOKEN (public data only)
#
# A token with the 'repo' scope is required to include private repositories.
# Without it the run still succeeds and degrades gracefully to public data.

name: Update Profile Stats

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/update-stats.yml'
      - 'scripts/**'

permissions:
  contents: write

# Avoid overlapping runs racing on the same branch / commit.
concurrency:
  group: update-profile-stats
  cancel-in-progress: false

jobs:
  update-stats:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve token (file / env / secret -> GITHUB_TOKEN fallback)
        id: token
        run: |
          set -euo pipefail
          # 1) Token file (best for Docker secret mounts).
          TOKEN=""
          for TOKEN_FILE in "/run/secrets/gh_stats_token" "$HOME/.gh_stats_token" "/etc/gh_stats_token"; do
            if [ -f "$TOKEN_FILE" ]; then
              TOKEN="$(tr -d '\n\r' < "$TOKEN_FILE")"
              echo "✅ Found token file at $TOKEN_FILE"
              break
            fi
          done
          # 2) Environment variable.
          if [ -z "$TOKEN" ] && [ -n "${GH_STATS_TOKEN:-}" ]; then
            TOKEN="$GH_STATS_TOKEN"
            echo "✅ Using GH_STATS_TOKEN environment variable"
          fi
          if [ -n "$TOKEN" ]; then
            echo "::add-mask::$TOKEN"
            echo "FILE_TOKEN=$TOKEN" >> "$GITHUB_OUTPUT"
          else
            echo "ℹ️  No token file or env var found; will use PAT_TOKEN secret or GITHUB_TOKEN fallback."
          fi

      - name: Fetch comprehensive GitHub stats
        id: stats
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.token.outputs.FILE_TOKEN || secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const owner = 'polo-nyan';
            const org = 'smol-kitten';

            // Wrap any API call so a single failure never aborts the whole run.
            const safe = async (label, fn, fallback) => {
              try { return await fn(); }
              catch (e) { console.log(`⚠️  ${label} failed: ${e.message}`); return fallback; }
            };

            let userRepos = [];
            let hasPrivateAccess = false;

            // Check token scopes (informational only).
            await safe('scope check', async () => {
              const { headers } = await github.request('GET /user');
              const scopes = headers['x-oauth-scopes'] || 'none';
              console.log(`🔑 Token scopes: ${scopes}`);
              if (!scopes.includes('repo')) {
                console.log('⚠️  Token lacks "repo" scope; private repos will be omitted.');
              }
            });

            // Try authenticated user repos (needs PAT w/ repo scope), else public-only.
            try {
              console.log('🔍 Fetching repos (including private if permitted)...');
              let page = 1;
              while (true) {
                const { data: repos } = await github.rest.repos.listForAuthenticatedUser({
                  per_page: 100, page, affiliation: 'owner,organization_member', visibility: 'all'
                });
                if (repos.length === 0) break;
                userRepos = userRepos.concat(repos);
                page++;
              }
              const privateCount = userRepos.filter(r => r.private).length;
              if (privateCount > 0) {
                hasPrivateAccess = true;
                console.log(`✅ Fetched ${userRepos.length} repos (${privateCount} private)`);
              } else {
                console.log(`⚠️  Fetched ${userRepos.length} repos but none private (token likely lacks "repo").`);
              }
            } catch (e) {
              console.log('⚠️  Falling back to public repos only: ' + e.message);
              userRepos = [];
              let page = 1;
              while (true) {
                const { data: repos } = await safe('listForUser', () =>
                  github.rest.repos.listForUser({ username: owner, per_page: 100, page, type: 'owner' }),
                  { data: [] });
                if (!repos || repos.length === 0) break;
                userRepos = userRepos.concat(repos);
                page++;
              }
              console.log(`Found ${userRepos.length} public repos for ${owner}`);
            }

            // Org repos (deduplicated).
            await safe('listForOrg', async () => {
              let page = 1;
              while (true) {
                const { data: repos } = await github.rest.repos.listForOrg({
                  org, per_page: 100, page, type: hasPrivateAccess ? 'all' : 'public'
                });
                if (repos.length === 0) break;
                for (const repo of repos) {
                  if (!userRepos.find(r => r.full_name === repo.full_name)) userRepos.push(repo);
                }
                page++;
              }
              console.log(`Total repos after org fetch: ${userRepos.length}`);
            });

            const personalRepos = userRepos.filter(r => r.owner.login === owner);
            const orgRepos = userRepos.filter(r => r.owner.login === org);
            const allRepos = userRepos;

            const totalRepos = allRepos.length;
            const publicRepos = allRepos.filter(r => !r.private).length;
            const privateRepos = allRepos.filter(r => r.private).length;
            const totalStars = allRepos.reduce((s, r) => s + (r.stargazers_count || 0), 0);
            const totalForks = allRepos.reduce((s, r) => s + (r.forks_count || 0), 0);
            const totalWatchers = allRepos.reduce((s, r) => s + (r.watchers_count || 0), 0);
            const totalOpenIssues = allRepos.reduce((s, r) => s + (r.open_issues_count || 0), 0);

            // Early guard: an empty fetch means the API/token failed. Bail before
            // doing expensive per-repo work, and (below) preserve last-good stats.
            if (totalRepos === 0) {
              console.log('⚠️  Empty fetch (0 repos) — token/permissions failure. Preserving existing stats.json (no overwrite).');
              return;
            }

            // Languages (per-repo call is guarded individually).
            const langBytes = {}, langRepoCount = {};
            console.log('🔍 Fetching language data...');
            for (const repo of allRepos) {
              const langs = await safe(`languages ${repo.full_name}`, async () => {
                const { data } = await github.rest.repos.listLanguages({ owner: repo.owner.login, repo: repo.name });
                return data;
              }, {});
              for (const [lang, bytes] of Object.entries(langs || {})) {
                langBytes[lang] = (langBytes[lang] || 0) + bytes;
                langRepoCount[lang] = (langRepoCount[lang] || 0) + 1;
              }
            }
            const sortedLangs = Object.entries(langBytes).sort((a, b) => b[1] - a[1]).slice(0, 10);
            const totalBytes = Object.values(langBytes).reduce((a, b) => a + b, 0) || 1;
            const langColors = {
              'C#': '#178600', 'PHP': '#4F5D95', 'JavaScript': '#f1e05a', 'TypeScript': '#3178c6',
              'Python': '#3572A5', 'HTML': '#e34c26', 'CSS': '#563d7c', 'Shell': '#89e051',
              'Lua': '#000080', 'Java': '#b07219', 'C++': '#f34b7d', 'C': '#555555', 'Go': '#00ADD8',
              'Rust': '#dea584', 'Vue': '#41b883', 'Ruby': '#701516', 'Dockerfile': '#384d54',
              'PowerShell': '#012456', 'Makefile': '#427819', 'Batchfile': '#C1F12E'
            };
            const langDistribution = sortedLangs.map(([lang, bytes]) => ({
              name: lang, bytes,
              percentage: ((bytes / totalBytes) * 100).toFixed(1),
              repos: langRepoCount[lang], color: langColors[lang] || '#858585'
            }));

            // Commit counts (guarded, capped at 30 repos).
            console.log('🔍 Fetching commit counts...');
            const commitCounts = [];
            for (const repo of allRepos.slice(0, 30)) {
              const contributors = await safe(`contributors ${repo.full_name}`, async () => {
                const { data } = await github.rest.repos.listContributors({ owner: repo.owner.login, repo: repo.name, per_page: 100 });
                return data;
              }, []);
              const mine = (contributors || []).find(c => c.login === owner);
              if (mine) commitCounts.push({ repo: repo.name, commits: mine.contributions });
            }
            const totalCommits = commitCounts.reduce((s, r) => s + r.commits, 0);
            const avgCommitsPerRepo = commitCounts.length ? (totalCommits / commitCounts.length).toFixed(1) : '0';
            const sc = commitCounts.map(r => r.commits).sort((a, b) => a - b);
            let medianCommits = 0;
            if (sc.length) {
              const mid = Math.floor(sc.length / 2);
              medianCommits = sc.length % 2 ? sc[mid] : Math.round((sc[mid - 1] + sc[mid]) / 2);
            }

            // Recent push events (30d window via event feed).
            let recentCommits = 0;
            await safe('events', async () => {
              const { data: events } = await github.rest.activity.listEventsForAuthenticatedUser({ username: owner, per_page: 100 });
              recentCommits = events.filter(e => e.type === 'PushEvent').length;
            });

            const repoAges = allRepos.map(r => Math.floor((Date.now() - new Date(r.created_at)) / (1000*60*60*24*365)));
            const avgRepoAge = allRepos.length ? (repoAges.reduce((a, b) => a + b, 0) / allRepos.length).toFixed(1) : '0';

            const topStarred = [...allRepos].filter(r => !r.private)
              .sort((a, b) => b.stargazers_count - a.stargazers_count).slice(0, 5);

            const totalSize = allRepos.reduce((s, r) => s + (r.size || 0), 0);
            const totalSizeMB = (totalSize / 1024).toFixed(1);

            // File/line estimates (guarded, capped at 20 repos).
            console.log('📜 Estimating file/line statistics...');
            let totalFiles = 0, totalLines = 0, reposWithStats = 0;
            for (const repo of allRepos.slice(0, 20)) {
              const ok = await safe(`tree ${repo.full_name}`, async () => {
                const { data: repoData } = await github.rest.repos.get({ owner: repo.owner.login, repo: repo.name });
                const { data: tree } = await github.rest.git.getTree({
                  owner: repo.owner.login, repo: repo.name, tree_sha: repoData.default_branch, recursive: 'true'
                });
                return tree;
              }, null);
              if (!ok) continue;
              totalFiles += ok.tree.filter(t => t.type === 'blob').length;
              totalLines += Math.round((repo.size || 0) * 1024 / 25);
              reposWithStats++;
            }
            const avgFilesPerRepo = reposWithStats ? Math.round(totalFiles / reposWithStats) : 0;
            const avgLinesPerRepo = reposWithStats ? Math.round(totalLines / reposWithStats) : 0;
            const avgLinesPerFile = totalFiles ? Math.round(totalLines / totalFiles) : 0;
            const estimatedTotalFiles = Math.round(avgFilesPerRepo * allRepos.length);
            const estimatedTotalLines = Math.round(avgLinesPerRepo * allRepos.length);

            const reposByYear = {};
            allRepos.forEach(r => { const y = new Date(r.created_at).getFullYear(); reposByYear[y] = (reposByYear[y] || 0) + 1; });

            const licenses = {};
            allRepos.filter(r => !r.private && r.license).forEach(r => {
              const lic = r.license.spdx_id || 'Other'; licenses[lic] = (licenses[lic] || 0) + 1;
            });

            const archivedRepos = allRepos.filter(r => r.archived).length;
            const activeRepos = allRepos.filter(r => !r.archived).length;
            const forkedRepos = allRepos.filter(r => r.fork).length;
            const originalRepos = allRepos.filter(r => !r.fork).length;

            const recentlyUpdated = [...allRepos].filter(r => !r.private)
              .sort((a, b) => new Date(b.pushed_at) - new Date(a.pushed_at)).slice(0, 5);

            // --- AI pair-programming usage (Co-authored-by trailers) ------------
            // Scan commit messages authored by `owner` for AI co-author trailers
            // (e.g. "Co-authored-by: Claude Opus 4.8 (1M context) <noreply@anthropic.com>")
            // and aggregate by model family and by month so the README can show
            // which models/families are used and how usage trends over time.
            console.log('🤖 Scanning commits for AI co-author trailers...');

            // Anthropic model families, ordered specific -> generic. First match wins.
            const AI_FAMILIES = ['Opus', 'Sonnet', 'Haiku', 'Fable'];

            // Classify a single Co-authored-by entry into { isAI, family, model }.
            const classifyCoauthor = (name, email) => {
              const n = (name || '').trim();
              const e = (email || '').toLowerCase();
              const hay = (n + ' ' + e).toLowerCase();
              const isAnthropicEmail = /@(.*\.)?anthropic\.com$/.test(e);
              const isClaudeDomain = /@(.*\.)?claude\./.test(e) || e.includes('claude.goes.moe');
              const looksClaude = /\b(claude|anthropic|opus|sonnet|haiku|fable)\b/i.test(hay);
              if (!isAnthropicEmail && !isClaudeDomain && !looksClaude) {
                // Recognise other common AI assistants, bucketed under "Other AI".
                if (/\b(copilot|chatgpt|openai|gpt-?\d|cursor|codeium|gemini|devin|codex|tabnine|aider)\b/i.test(hay)) {
                  return { isAI: true, family: 'Other AI', model: n || 'AI assistant' };
                }
                return { isAI: false };
              }
              let family = 'Claude';
              for (const f of AI_FAMILIES) {
                if (new RegExp('\\b' + f + '\\b', 'i').test(hay)) { family = f; break; }
              }
              // Clean model label: drop parentheticals + a leading "Claude".
              let model = n.replace(/\(.*?\)/g, ' ').replace(/\s+/g, ' ').trim();
              const modelNoClaude = model.replace(/^claude\s+/i, '').trim();
              if (family === 'Claude') model = 'Claude';
              else model = modelNoClaude || ('Claude ' + family);
              return { isAI: true, family, model };
            };

            // Matches trailer lines like "Co-authored-by: Name <email>" anywhere in a message.
            const COAUTHOR_RE = /^[ \t]*co-authored-by:[ \t]*(.+?)[ \t]*<([^>]*)>[ \t]*$/gim;

            const aiByFamily = {};
            const aiByModel = {};
            const aiByMonth = {};        // 'YYYY-MM' -> { total, families: { fam: n } }
            let aiCommits = 0;           // commits with >= 1 AI co-author
            let aiCoauthorMentions = 0;  // total AI trailer lines
            let scannedCommits = 0;      // total commits scanned (for assist rate)

            // Most-recently-pushed repos first; cap the scan to respect rate limits.
            const reposForAI = [...allRepos]
              .sort((a, b) => new Date(b.pushed_at) - new Date(a.pushed_at))
              .slice(0, 50);
            const MAX_PAGES = 5; // up to 500 commits per repo

            // Commit-time patterns (aggregate, no repo names): when do I commit?
            const hourBuckets = new Array(24).fill(0);   // UTC hour 0-23
            const weekdayBuckets = new Array(7).fill(0); // 0=Sun .. 6=Sat

            for (const repo of reposForAI) {
              for (let page = 1; page <= MAX_PAGES; page++) {
                const commits = await safe(`commits ${repo.full_name} p${page}`, async () => {
                  const { data } = await github.rest.repos.listCommits({
                    owner: repo.owner.login, repo: repo.name, author: owner, per_page: 100, page
                  });
                  return data;
                }, []);
                if (!commits || commits.length === 0) break;
                for (const c of commits) {
                  scannedCommits++;
                  const cdate = c.commit?.author?.date || c.commit?.committer?.date;
                  if (cdate) {
                    const dt = new Date(cdate);
                    if (!isNaN(dt)) { hourBuckets[dt.getUTCHours()]++; weekdayBuckets[dt.getUTCDay()]++; }
                  }
                  const msg = c.commit?.message || '';
                  COAUTHOR_RE.lastIndex = 0;
                  const famsThisCommit = new Set();
                  let m;
                  while ((m = COAUTHOR_RE.exec(msg)) !== null) {
                    const info = classifyCoauthor(m[1], m[2]);
                    if (!info.isAI) continue;
                    aiCoauthorMentions++;
                    aiByFamily[info.family] = (aiByFamily[info.family] || 0) + 1;
                    aiByModel[info.model] = (aiByModel[info.model] || 0) + 1;
                    famsThisCommit.add(info.family);
                  }
                  if (famsThisCommit.size > 0) {
                    aiCommits++;
                    const d = c.commit?.author?.date || c.commit?.committer?.date;
                    if (d) {
                      const month = d.slice(0, 7); // YYYY-MM
                      if (!aiByMonth[month]) aiByMonth[month] = { total: 0, families: {} };
                      aiByMonth[month].total++;
                      for (const fam of famsThisCommit) {
                        aiByMonth[month].families[fam] = (aiByMonth[month].families[fam] || 0) + 1;
                      }
                    }
                  }
                }
                if (commits.length < 100) break;
              }
            }

            const aiFamilyDist = Object.entries(aiByFamily)
              .sort((a, b) => b[1] - a[1]).map(([family, count]) => ({ family, count }));
            const aiTopModels = Object.entries(aiByModel)
              .sort((a, b) => b[1] - a[1]).slice(0, 12).map(([model, count]) => ({ model, count }));
            const aiMonthly = Object.keys(aiByMonth).sort()
              .map(month => ({ month, total: aiByMonth[month].total, families: aiByMonth[month].families }));

            const aiStats = {
              enabled: aiCommits > 0,
              totalAICommits: aiCommits,
              totalCoauthorMentions: aiCoauthorMentions,
              scannedCommits,
              assistRate: scannedCommits ? ((aiCommits / scannedCommits) * 100).toFixed(1) : '0',
              topFamily: aiFamilyDist[0]?.family || null,
              topModel: aiTopModels[0]?.model || null,
              familyOrder: aiFamilyDist.map(f => f.family),
              families: aiFamilyDist,
              topModels: aiTopModels,
              monthly: aiMonthly
            };
            console.log(`🤖 AI usage: ${aiCommits}/${scannedCommits} commits assisted across ${aiFamilyDist.length} families.`);

            // --- Commit-time patterns (derived from the scan above) --------------
            const WEEKDAY_NAMES = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const maxHour = Math.max(...hourBuckets);
            const maxWeekday = Math.max(...weekdayBuckets);
            const commitPatterns = {
              byHour: hourBuckets,
              byWeekday: weekdayBuckets,
              topHour: maxHour > 0 ? hourBuckets.indexOf(maxHour) : null,
              topWeekday: maxWeekday > 0 ? WEEKDAY_NAMES[weekdayBuckets.indexOf(maxWeekday)] : null,
              sampleSize: scannedCommits,
            };

            // --- Developer activity via GraphQL contributionsCollection ----------
            // Private-inclusive for the authenticated viewer. All aggregate counts
            // and dates — no repo names are surfaced.
            let activity = null, prsAllTime = null;
            await safe('graphql contributions', async () => {
              const q = `query {
                viewer {
                  mergedPRs: pullRequests(states: MERGED) { totalCount }
                  openedPRs: pullRequests { totalCount }
                  contributionsCollection {
                    totalCommitContributions
                    totalPullRequestContributions
                    totalPullRequestReviewContributions
                    totalIssueContributions
                    restrictedContributionsCount
                    contributionCalendar {
                      totalContributions
                      weeks { contributionDays { date contributionCount } }
                    }
                  }
                }
              }`;
              const r = await github.graphql(q);
              const cc = r.viewer.contributionsCollection;
              const days = cc.contributionCalendar.weeks
                .flatMap(w => w.contributionDays)
                .sort((a, b) => (a.date < b.date ? -1 : 1));
              const sumLast = n => days.slice(-n).reduce((s, d) => s + d.contributionCount, 0);
              // Current streak: count back from the most recent day; a trailing
              // zero (today, not done yet) doesn't break the streak.
              let cur = 0;
              for (let i = days.length - 1; i >= 0; i--) {
                if (days[i].contributionCount > 0) cur++;
                else if (i === days.length - 1) continue;
                else break;
              }
              let lon = 0, run = 0;
              for (const d of days) { if (d.contributionCount > 0) { run++; if (run > lon) lon = run; } else run = 0; }
              const busiest = days.reduce((m, d) => (d.contributionCount > (m ? m.count : -1) ? { date: d.date, count: d.contributionCount } : m), null);
              // NOTE: the per-type totals (totalCommitContributions etc.) are
              // PUBLIC-ONLY and would contradict the private-inclusive calendar
              // totals below, so we intentionally surface only the calendar-
              // derived, self-consistent metrics + all-time PRs.
              activity = {
                window: 'past 12 months',
                totalContributions: cc.contributionCalendar.totalContributions,
                currentStreakDays: cur,
                longestStreakDays: lon,
                last30d: sumLast(30),
                last90d: sumLast(90),
                activeDays: days.filter(d => d.contributionCount > 0).length,
                busiestDay: busiest,
              };
              const merged = r.viewer.mergedPRs.totalCount;
              const opened = r.viewer.openedPRs.totalCount;
              prsAllTime = { opened, merged, mergeRate: opened ? ((merged / opened) * 100).toFixed(1) : '0' };
            });

            // --- CI/CD health (aggregate; capped to recent repos) ----------------
            console.log('⚙️  Sampling CI/CD health...');
            let ciReposScanned = 0, ciReposWithWf = 0, ciRunsSampled = 0, ciRunsSuccess = 0;
            const ciRepos = [...allRepos]
              .sort((a, b) => new Date(b.pushed_at) - new Date(a.pushed_at))
              .slice(0, 30);
            for (const repo of ciRepos) {
              ciReposScanned++;
              const wf = await safe(`workflows ${repo.full_name}`, async () => {
                const { data } = await github.rest.actions.listRepoWorkflows({ owner: repo.owner.login, repo: repo.name });
                return data;
              }, null);
              if (!wf || !wf.total_count) continue;
              ciReposWithWf++;
              const runs = await safe(`runs ${repo.full_name}`, async () => {
                const { data } = await github.rest.actions.listWorkflowRunsForRepo({ owner: repo.owner.login, repo: repo.name, per_page: 15, status: 'completed' });
                return data;
              }, null);
              for (const wr of (runs?.workflow_runs || [])) { ciRunsSampled++; if (wr.conclusion === 'success') ciRunsSuccess++; }
            }
            const ci = {
              reposScanned: ciReposScanned,
              reposWithWorkflows: ciReposWithWf,
              workflowsPct: ciReposScanned ? Math.round((ciReposWithWf / ciReposScanned) * 100).toString() : '0',
              runsSampled: ciRunsSampled,
              successRate: ciRunsSampled ? ((ciRunsSuccess / ciRunsSampled) * 100).toFixed(1) : '0',
            };
            console.log(`⚙️  CI: ${ciReposWithWf}/${ciReposScanned} repos with workflows, ${ci.successRate}% success over ${ciRunsSampled} runs.`);

            // Guard: a degraded or empty fetch (transient API failure, expired
            // token, GITHUB_TOKEN fallback that owns no repos) must NEVER
            // overwrite good stats with zeros. Preserve the last-good stats.json
            // and skip the write/commit instead of clobbering it — otherwise one
            // bad run freezes the profile README at all-zeros until the next
            // healthy run, which may be weeks away on a flaky self-hosted runner.
            {
              let prevTotal = 0;
              try {
                prevTotal = (JSON.parse(require('fs').readFileSync('stats.json', 'utf8')).totalRepos) || 0;
              } catch (e) { /* no prior stats.json yet */ }
              if (totalRepos === 0 || (prevTotal >= 10 && totalRepos < prevTotal * 0.5)) {
                console.log(`⚠️  Degraded fetch: got ${totalRepos} repos vs last-good ${prevTotal}. Preserving existing stats.json (no overwrite, no commit).`);
                return;
              }
            }

            const stats = {
              totalRepos, publicRepos, privateRepos,
              personalRepos: personalRepos.length, orgRepos: orgRepos.length,
              personalPublic: personalRepos.filter(r => !r.private).length,
              personalPrivate: personalRepos.filter(r => r.private).length,
              orgPublic: orgRepos.filter(r => !r.private).length,
              orgPrivate: orgRepos.filter(r => r.private).length,
              totalStars, totalForks, totalWatchers, totalOpenIssues, totalSizeMB,
              languages: langDistribution, topLanguage: sortedLangs[0]?.[0] || 'Unknown',
              totalCommits, avgCommitsPerRepo, medianCommits, recentCommits, avgRepoAge,
              estimatedTotalFiles, avgFilesPerRepo, estimatedTotalLines, avgLinesPerRepo, avgLinesPerFile,
              archivedRepos, activeRepos, forkedRepos, originalRepos, reposByYear, licenses,
              oldestPublicRepo: (() => {
                const o = allRepos.filter(r => !r.private).reduce((o, r) => !o || new Date(r.created_at) < new Date(o.created_at) ? r : o, null);
                return o ? { name: o.name, date: o.created_at?.split('T')[0] } : null;
              })(),
              newestPublicRepo: (() => {
                const n = allRepos.filter(r => !r.private).reduce((n, r) => !n || new Date(r.created_at) > new Date(n.created_at) ? r : n, null);
                return n ? { name: n.name, date: n.created_at?.split('T')[0] } : null;
              })(),
              topStarred: topStarred.map(r => ({ name: r.name, stars: r.stargazers_count, url: r.html_url, description: r.description || '' })),
              recentlyUpdated: recentlyUpdated.map(r => ({ name: r.name, url: r.html_url, pushedAt: r.pushed_at?.split('T')[0] })),
              activity, prsAllTime, commitPatterns, ci,
              ai: aiStats,
              updatedAt: new Date().toISOString().split('T')[0]
            };

            require('fs').writeFileSync('stats.json', JSON.stringify(stats, null, 2) + '\n');
            console.log(`📊 Wrote stats.json (repos=${totalRepos}, langs=${langDistribution.length}).`);

      - name: Assemble README from stats
        run: |
          set -euo pipefail
          if ! command -v jq >/dev/null 2>&1; then
            echo "❌ jq is required on the runner but was not found." >&2
            exit 1
          fi
          chmod +x scripts/build-readme.sh
          # The script is self-bootstrapping: it creates README.md from the
          # template if missing, and only rewrites the STATS:START..END region.
          ./scripts/build-readme.sh

      - name: Commit and push (only on real diff)
        run: |
          set -euo pipefail
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          # Stage only the generated artifacts.
          git add README.md stats.json

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: auto-update profile stats $(date -u +%Y-%m-%d)"

          # Rebase on top of any concurrent changes, then push normally.
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "✅ Pushed updated profile stats."
