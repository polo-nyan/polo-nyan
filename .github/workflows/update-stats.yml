      - name: Commit and Push (Amend to avoid commit spam)
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add README.md stats.json
          
          if ! git diff --staged --quiet; then
            # Check if last commit was a stats update
            LAST_COMMIT_MSG=$(git log -1 --pretty=%s 2>/dev/null || echo "")
            
            if [[ "$LAST_COMMIT_MSG" == *"Auto-update profile stats"* ]]; then
              # Amend the previous stats commit to avoid spam
              git commit --amend --no-edit -m "📊 Auto-update profile stats $(date +%Y-%m-%d)"
              git push --force-with-lease
              echo "Amended previous stats commit"
            else
              # First stats commit or after manual commits
              git commit -m "📊 Auto-update profile stats $(date +%Y-%m-%d)"
              git push
              echo "Created new stats commit"
            fi
          else
            echo "No changes to commit"
          fi
