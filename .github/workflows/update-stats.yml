# Auto-update GitHub Profile Stats using API data
# Generates custom SVG cards and updates README with comprehensive stats
#
# === TOKEN SETUP FOR SELF-HOSTED RUNNERS ===
# Since self-hosted runners (especially Docker containers) may not have
# access to repository secrets, you have several options:
#
# OPTION 1: Token file (recommended for Docker)
#   Create a file at /run/secrets/gh_stats_token or ~/.gh_stats_token
#   containing just the token string (no newline at end)
#   For Docker: Mount the secret file into the container
#
# OPTION 2: Environment variable
#   Set GH_STATS_TOKEN env var (may not work in all Docker setups)
#
# OPTION 3: Repository secret (if you have access)
#   Create PAT_TOKEN secret in repository settings
#
# The token needs 'repo' scope for private repository access.
# Fallback: Uses GITHUB_TOKEN (public repos only) if no PAT is available.

name: Update Profile Stats

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/update-stats.yml'

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Load token from file (Docker support)
        id: token
        run: |
          # Try multiple locations for the token file
          TOKEN=""
          for TOKEN_FILE in "/run/secrets/gh_stats_token" "$HOME/.gh_stats_token" "/etc/gh_stats_token"; do
            if [ -f "$TOKEN_FILE" ]; then
              TOKEN=$(cat "$TOKEN_FILE" | tr -d '\n\r')
              echo "✅ Found token file at $TOKEN_FILE"
              break
            fi
          done
          
          # Fall back to environment variable
          if [ -z "$TOKEN" ] && [ -n "$GH_STATS_TOKEN" ]; then
            TOKEN="$GH_STATS_TOKEN"
            echo "✅ Using GH_STATS_TOKEN environment variable"
          fi
          
          if [ -n "$TOKEN" ]; then
            echo "FILE_TOKEN=$TOKEN" >> $GITHUB_OUTPUT
            echo "::add-mask::$TOKEN"
          else
            echo "⚠️ No token file or env var found, will use default GITHUB_TOKEN"
          fi
      
      - name: Fetch Comprehensive GitHub Stats
        id: stats
        uses: actions/github-script@v7
        env:
          FILE_TOKEN: ${{ steps.token.outputs.FILE_TOKEN }}
          SECRET_TOKEN: ${{ secrets.PAT_TOKEN }}
        with:
          github-token: ${{ steps.token.outputs.FILE_TOKEN || secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const owner = 'polo-nyan';
            const org = 'smol-kitten';
            
            let userRepos = [];
            let hasPrivateAccess = false;
            
            // Check token scopes first
            try {
              const { headers } = await github.request('GET /user');
              const scopes = headers['x-oauth-scopes'] || 'none';
              console.log(`🔑 Token scopes: ${scopes}`);
              if (!scopes.includes('repo')) {
                console.log('⚠️ WARNING: Token does not have "repo" scope!');
                console.log('   Private repos require a token with full "repo" scope');
                console.log('   Current scopes only allow public repo access');
              }
            } catch (e) {
              console.log('Could not check token scopes: ' + e.message);
            }
            
            // Try to fetch with authenticated user endpoint (requires PAT with repo scope)
            try {
              console.log('🔍 Attempting to fetch all repos (including private)...');
              let page = 1;
              while (true) {
                const { data: repos } = await github.rest.repos.listForAuthenticatedUser({
                  per_page: 100,
                  page: page,
                  affiliation: 'owner,organization_member',
                  visibility: 'all'
                });
                if (repos.length === 0) break;
                userRepos = userRepos.concat(repos);
                page++;
              }
              
              // Check if we actually got private repos
              const privateCount = userRepos.filter(r => r.private).length;
              if (privateCount > 0) {
                hasPrivateAccess = true;
                console.log(`✅ PAT working - fetched ${userRepos.length} repos (${privateCount} private)`);
              } else {
                console.log(`⚠️ Fetched ${userRepos.length} repos but none are private`);
                console.log('   This usually means the token lacks "repo" scope');
                console.log('   Create a new token at: https://github.com/settings/tokens');
                console.log('   Required scope: "repo" (Full control of private repositories)');
              }
            } catch (e) {
              // Fallback to public-only endpoints (works with GITHUB_TOKEN)
              console.log('⚠️ No PAT available, falling back to public repos only...');
              console.log('   Error: ' + e.message);
              console.log('   To include private repos, set GH_STATS_TOKEN env var on your runner');
              
              let page = 1;
              while (true) {
                const { data: repos } = await github.rest.repos.listForUser({
                  username: owner,
                  per_page: 100,
                  page: page,
                  type: 'owner'
                });
                if (repos.length === 0) break;
                userRepos = userRepos.concat(repos);
                page++;
              }
              console.log(`Found ${userRepos.length} public repos for ${owner}`);
            }
            
            // Fetch org repos
            let page = 1;
            try {
              while (true) {
                const { data: repos } = await github.rest.repos.listForOrg({
                  org: org,
                  per_page: 100,
                  page: page,
                  type: hasPrivateAccess ? 'all' : 'public'
                });
                if (repos.length === 0) break;
                // Only add repos not already in the list
                for (const repo of repos) {
                  if (!userRepos.find(r => r.full_name === repo.full_name)) {
                    userRepos.push(repo);
                  }
                }
                page++;
              }
              console.log(`Total repos after org fetch: ${userRepos.length}`);
            } catch (e) {
              console.log('Could not fetch org repos: ' + e.message);
            }
            
            // Separate personal and org repos
            const personalRepos = userRepos.filter(r => r.owner.login === owner);
            const orgRepos = userRepos.filter(r => r.owner.login === org);
            
            // Combine all repos (deduplicated)
            const allRepos = userRepos;
            
            // Count basic stats
            const totalRepos = allRepos.length;
            const publicRepos = allRepos.filter(r => !r.private).length;
            const privateRepos = allRepos.filter(r => r.private).length;
            const totalStars = allRepos.reduce((sum, r) => sum + r.stargazers_count, 0);
            const totalForks = allRepos.reduce((sum, r) => sum + r.forks_count, 0);
            const totalWatchers = allRepos.reduce((sum, r) => sum + r.watchers_count, 0);
            const totalOpenIssues = allRepos.reduce((sum, r) => sum + r.open_issues_count, 0);
            
            // Count languages across all repos
            const langBytes = {};
            const langRepoCount = {};
            
            console.log('🔍 Fetching language data for repos...');
            
            for (const repo of allRepos) {
              try {
                const { data: langs } = await github.rest.repos.listLanguages({
                  owner: repo.owner.login,
                  repo: repo.name
                });
                for (const [lang, bytes] of Object.entries(langs)) {
                  langBytes[lang] = (langBytes[lang] || 0) + bytes;
                  langRepoCount[lang] = (langRepoCount[lang] || 0) + 1;
                }
              } catch (e) {
                console.log(`Could not fetch languages for ${repo.full_name}`);
              }
            }
            
            // Sort languages by bytes
            const sortedLangs = Object.entries(langBytes)
              .sort((a, b) => b[1] - a[1])
              .slice(0, 10);
            
            const totalBytes = Object.values(langBytes).reduce((a, b) => a + b, 0);
            
            // Create language distribution with colors
            const langColors = {
              'C#': '#178600',
              'PHP': '#4F5D95',
              'JavaScript': '#f1e05a',
              'TypeScript': '#3178c6',
              'Python': '#3572A5',
              'HTML': '#e34c26',
              'CSS': '#563d7c',
              'Shell': '#89e051',
              'Lua': '#000080',
              'Java': '#b07219',
              'C++': '#f34b7d',
              'C': '#555555',
              'Go': '#00ADD8',
              'Rust': '#dea584',
              'Vue': '#41b883',
              'Ruby': '#701516',
              'Dockerfile': '#384d54',
              'PowerShell': '#012456',
              'Makefile': '#427819',
              'Batchfile': '#C1F12E'
            };
            
            const langDistribution = sortedLangs.map(([lang, bytes]) => ({
              name: lang,
              bytes: bytes,
              percentage: ((bytes / totalBytes) * 100).toFixed(1),
              repos: langRepoCount[lang],
              color: langColors[lang] || '#858585'
            }));
            
            // Get commit activity with better counting
            let commitCounts = [];
            console.log('🔍 Fetching commit counts...');
            
            for (const repo of allRepos.slice(0, 30)) {
              try {
                // Get contributor stats which includes commit counts
                const { data: contributors } = await github.rest.repos.listContributors({
                  owner: repo.owner.login,
                  repo: repo.name,
                  per_page: 100
                });
                
                // Find the owner's contributions
                const ownerContrib = contributors.find(c => c.login === owner);
                if (ownerContrib) {
                  commitCounts.push({ repo: repo.name, commits: ownerContrib.contributions });
                }
              } catch (e) {
                // Skip repos we can't access
              }
            }
            
            // Calculate commit statistics
            const totalCommits = commitCounts.reduce((sum, r) => sum + r.commits, 0);
            const avgCommitsPerRepo = commitCounts.length > 0 
              ? (totalCommits / commitCounts.length).toFixed(1) 
              : '0';
            
            // Calculate median
            const sortedCommits = commitCounts.map(r => r.commits).sort((a, b) => a - b);
            let medianCommits = 0;
            if (sortedCommits.length > 0) {
              const mid = Math.floor(sortedCommits.length / 2);
              medianCommits = sortedCommits.length % 2 !== 0
                ? sortedCommits[mid]
                : Math.round((sortedCommits[mid - 1] + sortedCommits[mid]) / 2);
            }
            
            console.log(`📊 Commits: total=${totalCommits}, avg=${avgCommitsPerRepo}, median=${medianCommits}`);
            
            // Get recent activity
            let recentCommits = 0;
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            
            try {
              const { data: events } = await github.rest.activity.listEventsForAuthenticatedUser({
                username: owner,
                per_page: 100
              });
              recentCommits = events.filter(e => e.type === 'PushEvent').length;
            } catch (e) {
              console.log('Could not fetch events');
            }
            
            // Calculate repo age stats (all repos for stats, but no names exposed)
            const repoAges = allRepos.map(r => {
              const created = new Date(r.created_at);
              const now = new Date();
              return Math.floor((now - created) / (1000 * 60 * 60 * 24 * 365));
            });
            const avgRepoAge = allRepos.length > 0 
              ? (repoAges.reduce((a, b) => a + b, 0) / repoAges.length).toFixed(1)
              : '0';
            
            // Get most starred repos (PUBLIC ONLY - never expose private repo names!)
            const topStarred = [...allRepos]
              .filter(r => !r.private)
              .sort((a, b) => b.stargazers_count - a.stargazers_count)
              .slice(0, 5);
            
            // Calculate additional stats
            const totalSize = allRepos.reduce((sum, r) => sum + (r.size || 0), 0);
            const totalSizeMB = (totalSize / 1024).toFixed(1);
            
            // Fetch file counts and estimate lines for each repo
            let totalFiles = 0;
            let totalLines = 0;
            let reposWithStats = 0;
            
            console.log('📜 Fetching file/line statistics...');
            
            for (const repo of allRepos.slice(0, 20)) {
              try {
                // Get the default branch tree recursively
                const { data: repoData } = await github.rest.repos.get({
                  owner: repo.owner.login,
                  repo: repo.name
                });
                
                const { data: tree } = await github.rest.git.getTree({
                  owner: repo.owner.login,
                  repo: repo.name,
                  tree_sha: repoData.default_branch,
                  recursive: 'true'
                });
                
                // Count files (blobs only, exclude directories)
                const files = tree.tree.filter(t => t.type === 'blob');
                const fileCount = files.length;
                totalFiles += fileCount;
                
                // Estimate lines based on size (rough: ~25 bytes per line average for code)
                const repoLines = Math.round(repo.size * 1024 / 25);
                totalLines += repoLines;
                reposWithStats++;
                
              } catch (e) {
                // Skip repos we can't access
              }
            }
            
            // Calculate averages
            const avgFilesPerRepo = reposWithStats > 0 ? Math.round(totalFiles / reposWithStats) : 0;
            const avgLinesPerRepo = reposWithStats > 0 ? Math.round(totalLines / reposWithStats) : 0;
            const avgLinesPerFile = totalFiles > 0 ? Math.round(totalLines / totalFiles) : 0;
            
            // Extrapolate to all repos
            const estimatedTotalFiles = Math.round(avgFilesPerRepo * allRepos.length);
            const estimatedTotalLines = Math.round(avgLinesPerRepo * allRepos.length);
            
            console.log(`📜 Files: ~${estimatedTotalFiles} total, ${avgFilesPerRepo} avg/repo`);
            console.log(`📜 Lines: ~${estimatedTotalLines} total, ${avgLinesPerRepo} avg/repo, ${avgLinesPerFile} avg/file`);
            
            // Count repos by year created
            const reposByYear = {};
            allRepos.forEach(r => {
              const year = new Date(r.created_at).getFullYear();
              reposByYear[year] = (reposByYear[year] || 0) + 1;
            });
            
            // Get license distribution (public repos only)
            const licenses = {};
            allRepos.filter(r => !r.private && r.license).forEach(r => {
              const lic = r.license.spdx_id || 'Other';
              licenses[lic] = (licenses[lic] || 0) + 1;
            });
            
            // Count archived vs active
            const archivedRepos = allRepos.filter(r => r.archived).length;
            const activeRepos = allRepos.filter(r => !r.archived).length;
            
            // Count forked repos
            const forkedRepos = allRepos.filter(r => r.fork).length;
            const originalRepos = allRepos.filter(r => !r.fork).length;
            
            // Get repos with most recent activity (public only for display)
            const recentlyUpdated = [...allRepos]
              .filter(r => !r.private)
              .sort((a, b) => new Date(b.pushed_at) - new Date(a.pushed_at))
              .slice(0, 5);
            
            // Output all stats (only expose public repo names)
            const stats = {
              totalRepos,
              publicRepos,
              privateRepos,
              personalRepos: personalRepos.length,
              orgRepos: orgRepos.length,
              personalPublic: personalRepos.filter(r => !r.private).length,
              personalPrivate: personalRepos.filter(r => r.private).length,
              orgPublic: orgRepos.filter(r => !r.private).length,
              orgPrivate: orgRepos.filter(r => r.private).length,
              totalStars,
              totalForks,
              totalWatchers,
              totalOpenIssues,
              totalSizeMB,
              languages: langDistribution,
              topLanguage: sortedLangs[0]?.[0] || 'Unknown',
              totalCommits,
              avgCommitsPerRepo,
              medianCommits,
              recentCommits,
              avgRepoAge,
              estimatedTotalFiles,
              avgFilesPerRepo,
              estimatedTotalLines,
              avgLinesPerRepo,
              avgLinesPerFile,
              archivedRepos,
              activeRepos,
              forkedRepos,
              originalRepos,
              reposByYear,
              licenses,
              // Only expose public repo info
              oldestPublicRepo: (() => {
                const oldest = allRepos.filter(r => !r.private).reduce((o, r) => 
                  !o || new Date(r.created_at) < new Date(o.created_at) ? r : o, null);
                return oldest ? { name: oldest.name, date: oldest.created_at?.split('T')[0] } : null;
              })(),
              newestPublicRepo: (() => {
                const newest = allRepos.filter(r => !r.private).reduce((n, r) => 
                  !n || new Date(r.created_at) > new Date(n.created_at) ? r : n, null);
                return newest ? { name: newest.name, date: newest.created_at?.split('T')[0] } : null;
              })(),
              topStarred: topStarred.map(r => ({ name: r.name, stars: r.stargazers_count, url: r.html_url, description: r.description || '' })),
              recentlyUpdated: recentlyUpdated.map(r => ({ name: r.name, url: r.html_url, pushedAt: r.pushed_at?.split('T')[0] })),
              updatedAt: new Date().toISOString().split('T')[0]
            };
            
            const fs = require('fs');
            fs.writeFileSync('stats.json', JSON.stringify(stats, null, 2));
            
            console.log('📊 Stats collected:', stats);
            
            // Set outputs
            core.setOutput('stats', JSON.stringify(stats));
      
      - name: Generate README
        run: |
          cat > README.md << 'EOF'
          <div align="center">
          
          <!-- Header Banner -->
          <img src="https://capsule-render.vercel.app/api?type=waving&color=gradient&customColorList=6,12,19,24,30&height=180&section=header&text=Marc&fontSize=70&fontColor=fff&animation=fadeIn&fontAlignY=35&desc=Self-taught%20Hobby%20Developer&descSize=20&descAlignY=55" width="100%"/>
          
          <br>
          
          [![GitHub](https://img.shields.io/badge/polo--nyan-181717?style=for-the-badge&logo=github&logoColor=white)](https://github.com/polo-nyan)
          [![Location](https://img.shields.io/badge/Germany-🇩🇪-black?style=for-the-badge)](https://github.com/polo-nyan)
          [![Profile Views](https://komarev.com/ghpvc/?username=polo-nyan&color=blueviolet&style=for-the-badge&label=Views)](https://github.com/polo-nyan)
          
          </div>
          
          ## 👋 About Me
          
          ```yaml
          name: ╲⧹ ⎛⎝ Marc ⎠⎞⧸╱
          location: Germany 🇩🇪
          role: Self-taught Hobby Developer
          interests:
            - Backend Development
            - DevOps & Automation
            - Game Development
            - Machine Learning
          currently_learning: [ML/AI, IoT]
          fun_fact: Cat lover 🐱
          ```
          
          ---
          
          ## 🛠️ Tech Stack
          
          <div align="center">
          
          ### 💪 Primary
          
          ![C#](https://img.shields.io/badge/C%23-239120?style=for-the-badge&logo=csharp&logoColor=white)
          ![.NET](https://img.shields.io/badge/.NET-512BD4?style=for-the-badge&logo=dotnet&logoColor=white)
          ![PHP](https://img.shields.io/badge/PHP-777BB4?style=for-the-badge&logo=php&logoColor=white)
          ![MariaDB](https://img.shields.io/badge/MariaDB-003545?style=for-the-badge&logo=mariadb&logoColor=white)
          ![Linux](https://img.shields.io/badge/Linux-FCC624?style=for-the-badge&logo=linux&logoColor=black)
          ![Docker](https://img.shields.io/badge/Docker-2496ED?style=for-the-badge&logo=docker&logoColor=white)
          
          ### 🔧 Also Using
          
          ![Unity](https://img.shields.io/badge/Unity-000000?style=for-the-badge&logo=unity&logoColor=white)
          ![JavaScript](https://img.shields.io/badge/JavaScript-F7DF1E?style=for-the-badge&logo=javascript&logoColor=black)
          ![MySQL](https://img.shields.io/badge/MySQL-4479A1?style=for-the-badge&logo=mysql&logoColor=white)
          ![Nginx](https://img.shields.io/badge/Nginx-009639?style=for-the-badge&logo=nginx&logoColor=white)
          ![Redis](https://img.shields.io/badge/Redis-DC382D?style=for-the-badge&logo=redis&logoColor=white)
          ![Bash](https://img.shields.io/badge/Bash-4EAA25?style=for-the-badge&logo=gnubash&logoColor=white)
          ![Python](https://img.shields.io/badge/Python-3776AB?style=for-the-badge&logo=python&logoColor=white)
          ![PyTorch](https://img.shields.io/badge/PyTorch-EE4C2C?style=for-the-badge&logo=pytorch&logoColor=white)
          ![TensorFlow](https://img.shields.io/badge/TensorFlow-FF6F00?style=for-the-badge&logo=tensorflow&logoColor=white)
          ![Arduino](https://img.shields.io/badge/Arduino-00979D?style=for-the-badge&logo=arduino&logoColor=white)
          ![Azure](https://img.shields.io/badge/Azure-0078D4?style=for-the-badge&logo=microsoftazure&logoColor=white)
          ![Grafana](https://img.shields.io/badge/Grafana-F46800?style=for-the-badge&logo=grafana&logoColor=white)
          
          </div>
          
          ---
          
          ## 📊 GitHub Statistics
          
          <!-- STATS-START -->
          EOF
          
          # Read stats from JSON
          STATS=$(cat stats.json)
          
          TOTAL_REPOS=$(echo "$STATS" | jq -r '.totalRepos')
          PUBLIC_REPOS=$(echo "$STATS" | jq -r '.publicRepos')
          PRIVATE_REPOS=$(echo "$STATS" | jq -r '.privateRepos')
          PERSONAL_REPOS=$(echo "$STATS" | jq -r '.personalRepos')
          ORG_REPOS=$(echo "$STATS" | jq -r '.orgRepos')
          PERSONAL_PUBLIC=$(echo "$STATS" | jq -r '.personalPublic')
          PERSONAL_PRIVATE=$(echo "$STATS" | jq -r '.personalPrivate')
          ORG_PUBLIC=$(echo "$STATS" | jq -r '.orgPublic')
          ORG_PRIVATE=$(echo "$STATS" | jq -r '.orgPrivate')
          TOTAL_STARS=$(echo "$STATS" | jq -r '.totalStars')
          TOTAL_FORKS=$(echo "$STATS" | jq -r '.totalForks')
          TOP_LANG=$(echo "$STATS" | jq -r '.topLanguage')
          RECENT_COMMITS=$(echo "$STATS" | jq -r '.recentCommits')
          UPDATED_AT=$(echo "$STATS" | jq -r '.updatedAt')
          TOTAL_SIZE_MB=$(echo "$STATS" | jq -r '.totalSizeMB')
          ARCHIVED_REPOS=$(echo "$STATS" | jq -r '.archivedRepos')
          ACTIVE_REPOS=$(echo "$STATS" | jq -r '.activeRepos')
          ORIGINAL_REPOS=$(echo "$STATS" | jq -r '.originalRepos')
          FORKED_REPOS=$(echo "$STATS" | jq -r '.forkedRepos')
          TOTAL_COMMITS=$(echo "$STATS" | jq -r '.totalCommits')
          AVG_COMMITS=$(echo "$STATS" | jq -r '.avgCommitsPerRepo')
          MEDIAN_COMMITS=$(echo "$STATS" | jq -r '.medianCommits')
          ESTIMATED_FILES=$(echo "$STATS" | jq -r '.estimatedTotalFiles')
          AVG_FILES=$(echo "$STATS" | jq -r '.avgFilesPerRepo')
          ESTIMATED_LINES=$(echo "$STATS" | jq -r '.estimatedTotalLines')
          AVG_LINES_REPO=$(echo "$STATS" | jq -r '.avgLinesPerRepo')
          AVG_LINES_FILE=$(echo "$STATS" | jq -r '.avgLinesPerFile')
          AVG_REPO_AGE=$(echo "$STATS" | jq -r '.avgRepoAge')
          
          cat >> README.md << EOF
          
          <div align="center">
          
          ### 📈 Overview
          
          | 📁 Repositories | ⭐ Stars | 🍴 Forks | 💻 Top Language | 📦 Total Size |
          |:---------------:|:-------:|:--------:|:---------------:|:-------------:|
          | **${TOTAL_REPOS}** | **${TOTAL_STARS}** | **${TOTAL_FORKS}** | **${TOP_LANG}** | **${TOTAL_SIZE_MB} MB** |
          
          </div>
          
          ---
          
          ### 📁 Repository Distribution
          
          <div align="center">
          
          \`\`\`mermaid
          %%{init: {"theme": "base", "themeVariables": { "pie1": "#22c55e", "pie2": "#f59e0b", "pie3": "#3b82f6", "pie4": "#ec4899", "pieTextColor": "#ffffff", "pieLegendTextColor": "#e2e8f0", "pieSectionTextColor": "#ffffff", "pieStrokeColor": "#1e293b" }}}%%
          pie showData
              title Repository Visibility
              "🌐 Public" : ${PUBLIC_REPOS}
              "🔒 Private" : ${PRIVATE_REPOS}
          \`\`\`
          
          </div>
          
          <table align="center">
          <tr>
          <td align="center">
          
          **📊 By Visibility**
          
          | Type | Count |
          |:-----|------:|
          | 🌐 Public | ${PUBLIC_REPOS} |
          | 🔒 Private | ${PRIVATE_REPOS} |
          
          </td>
          <td align="center">
          
          **👤 By Owner**
          
          | Type | Public | Private |
          |:-----|-------:|--------:|
          | Personal | ${PERSONAL_PUBLIC} | ${PERSONAL_PRIVATE} |
          | Organization | ${ORG_PUBLIC} | ${ORG_PRIVATE} |
          
          </td>
